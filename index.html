<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTranslator</title>
    <link rel="stylesheet" href="style.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>


</head>
<body>
    <header class="header">
        <div class="Slog">JTranslate</div>
        <select class="bx-menu">
            <option>menu</option>
            <option>Materi dasar</option>
            <option>Kanji 320</option>
            <option>Irodori A2</option>
        </select>
    </header>
    <p>JTranslate adalah website khusus penerjemah kosakata dasar bahasa jepang yang dapat membantu memudahkan anda dalam belajar.</p>
<main class="konten">

    <div class="container">
        <div class="translator_property">
            <ul class="nuv_item">
                <li>
                    <select class="select">

                    </select>
                </li>
                <li class="bx bx-transfer"></li>
                <li>
                    <select class="select">

                    </select>
                </li>
            </ul>
            <div class="write_box">
                <div class="Property_form">
                    <textarea maxlength="5000" class="fromText" placeholder="writedown"></textarea>
                    <div class="icons">
                        <span class="bx bx-volume-full from"></span>
                        <div class="code_length">0/5,000</div>
                    </div>
                </div>
                <div class="Property_trans">
                    <textarea class="toTranslate" disabled></textarea>
                    <div class="icons">
                        <span class="bx bx-volume-full to"></span>
                        <span class="bx bx-copy"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="footer">
    &copy; 2024 JTranslate. All rights reserved.
</footer>
<p class="sub-footer">どうも　ありがとうございます。</p>
<script src="./language.js"></script>
<script src="./main.js"></script>
</body>
</html>
